<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memory - Game</title>

    <script type="module" src="/src/main.ts" defer></script>
</head>

<body data-page="game">
    <main class="game">
        <header class="game__header">
            <section class="game__score">
                <ul>
                    <li class="game__score--blue">
                        <img src="\assets\playerBlue.svg" alt="Blue"> 
                        <span id="score-blue">0</span>
                    </li>
                    <li class="game__score--orange">
                        <img src="\assets\playerOrange.svg" alt="Orange">
                        <span id="score-orange">0</span>
                    </li>
                </ul>
            </section>
            <section class="game__player">
                <p class="current-player">Current Player:</p>
                <img id="current-player-icon" src="/assets/currentBlue.svg" alt="Current Player">
            </section>
            <button class="button button--exit" id="button-exit"></button>
        </header>
        <section class="game__field game__field--small" id="field">
        </section>
    </main>

    <dialog id="exitGame">
        <span>Are you sure you want to <br>quit the game?</span>
    
        <div class="dialog__buttons">
            <button class="button button--back" id="dialog-back"></button>
            <button class="button button--exit" id="dialog-exit"></button>
        </div>
    </dialog>
    

</body>

</html>
