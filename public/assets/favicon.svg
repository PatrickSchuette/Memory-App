<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <!-- Left blue card -->
  <rect x="8" y="38" width="70" height="90" rx="8" fill="#1E90FF" stroke="#000" stroke-width="3" transform="rotate(-10 43 83)"/>
  
  <!-- Right orange card -->
  <rect x="50" y="38" width="70" height="90" rx="8" fill="#FF7F00" stroke="#000" stroke-width="3" transform="rotate(10 85 83)"/>
  
  <!-- Center white card -->
  <rect x="24" y="18" width="80" height="100" rx="8" fill="#FFFFFF" stroke="#000" stroke-width="3"/>

  <!-- Stars -->
  <g transform="translate(32,48)">
    <polygon points="20,0 25,12 38,12 28,20 32,32 20,25 8,32 12,20 2,12 15,12"
             fill="#FFD700" stroke="#000" stroke-width="2"/>
    <polygon points="55,10 60,22 73,22 63,30 67,42 55,35 43,42 47,30 37,22 50,22"
             fill="#FFD700" stroke="#000" stroke-width="2"/>
  </g>

  <!-- Sparkles -->
  <circle cx="45" cy="40" r="3" fill="#FFD700"/>
  <circle cx="90" cy="40" r="3" fill="#FFD700"/>
  <circle cx="55" cy="110" r="2" fill="#FFD700"/>
  <circle cx="75" cy="110" r="2" fill="#FFD700"/>
</svg>
